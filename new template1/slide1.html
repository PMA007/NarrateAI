<!DOCTYPE html>
<html lang="en" data-theme="light" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>JNTU-GV - Vizianagaram</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=neue-machina@400,700,500&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #0F0F0F;
            color: #DDDDDD;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 1280px;
            height: 720px;
            margin: 0 auto;
            padding: 30px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Using the high quality campus image from search results */
            background-image: url("https://page.gensparksite.com/slides_images/4e8e7ed78be7af96b6248d09362837a6.webp");
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
        }

        .container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 15, 15, 0.7);
            z-index: -1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            display: flex;
            align-items: center;
            color: #CBF400;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .logo i {
            margin-right: 10px;
            font-size: 16px;
        }

        .date {
            color: #CBF400;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .main-title {
            font-family: 'Neue Machina', sans-serif;
            color: #CBF400;
            font-size: 72px;
            /* Adjusted size for longer university name */
            font-weight: 700;
            line-height: 1.1;
            margin: 0;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Roboto Mono', monospace;
            color: #DDDDDD;
            font-size: 20px;
            margin-top: 25px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            max-width: 80%;
            line-height: 1.5;
        }

        .presenter-box {
            background-color: #CBF400;
            color: #0F0F0F;
            padding: 10px 40px;
            font-size: 18px;
            margin-top: 40px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            color: #CBF400;
            font-size: 16px;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body style="">
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-university"></i>
                JNTU-GV
            </div>
            <div class="date">2026-01-24</div>
        </div>
        <div class="main-content">
            <h1 class="main-title">Jawaharlal Nehru<br>Technological University<br>Gurajada, Vizianagaram</h1>
            <div class="subtitle">Advancing engineering education and research in North Andhra</div>
            <div class="presenter-box">JNTU-GV, Vizianagaram</div>
        </div>
        <div class="footer">
            <div>Dwarapudi, Vizianagaram</div>
            <div>jntugv.edu.in</div>
        </div>
    </div>

</body>

</html>
